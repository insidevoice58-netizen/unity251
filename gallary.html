<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - Unity251</title>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial,sans-serif;
  text-align:center;
  margin:0;
}

header{
  background:#1b5e20;
  padding:20px;
}

a{
  color:gold;
  text-decoration:none;
  margin:10px;
}

.gallary{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.gallary img{
  width:100%;
  border-radius:10px;
  border:3px solid gold;
}

footer{
  background:#1b5e20;
  padding:15px;
  margin-top:20px;
}
</style>

</head>

<body>

<header>
<h1>Unity251 Gallery</h1>

<a href="index.html">መነሻ</a>
<a href="about.html">ስለ እኛ</a>
<a href="contact.html">አግኙን</a>
</header>
<div class="gallery">

<img src="Screenshot_2026-07-17-17-46-44-796_com.google.android.googlequicksearchbox-edit.jpg" alt="ጎንደር">

<img src="Screenshot_2026-07-17-17-43-40-575_com.facebook.lite-edit.jpg" alt="ላሊበላ">

<img src="Screenshot_2026-07-17-17-46-44-796_com.google.android.googlequicksearchbox-edit.jpg" alt="ደብረ ሊባኖስ">

</div>


<footer>
© 2026 Unity251
</footer>
<script>
document.querySelectorAll(".gallery img").forEach(img => {
  img.style.cursor = "pointer";
  img.onclick = function () {
    const w = window.open("");
    w.document.write(`
      <html>
      <body style="margin:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;">
        <img src="${this.src}" style="max-width:100%;max-height:100%;">
      </body>
      </html>
    `);
  };
});
</script>
</body>
</html>
